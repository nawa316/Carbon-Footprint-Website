# .github/workflows/deploy-azure.yml

name: Build and Deploy to Azure (Production)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy-azure.yml'
  workflow_dispatch:

jobs:
  ###################################
  # JOB 0: DETECT CHANGES           #
  ###################################
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.resolve.outputs.backend }}
      frontend: ${{ steps.resolve.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

      - name: Resolve outputs (force true on manual dispatch)
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=${{ steps.filter.outputs.backend }}" >> $GITHUB_OUTPUT
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> $GITHUB_OUTPUT
          fi

  ###################################
  # JOB 1: LINT & FORMAT CHECK      #
  ###################################
  lint:
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 'Lint & Format Backend'
        if: needs.detect-changes.outputs.backend == 'true'
        working-directory: backend
        run: |
          npm ci
          npm run format:check
          npm run lint

      - name: 'Lint & Format Frontend'
        if: needs.detect-changes.outputs.frontend == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run format:check
          npm run lint

  ###################################
  # JOB 2: TEST & COVERAGE          #
  ###################################
  test:
    needs: [detect-changes, lint]
    runs-on: ubuntu-latest
    if: needs.lint.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: 'Backend Tests with Coverage'
        if: needs.detect-changes.outputs.backend == 'true'
        working-directory: backend
        run: |
          npm ci
          npm run test:ci

      - name: 'Frontend Tests with Coverage'
        if: needs.detect-changes.outputs.frontend == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run test:ci

  ###################################
  # JOB 2: BUILD & DEPLOY BACKEND   #
  ###################################
  build-and-deploy-backend:
    needs: [detect-changes, lint, test]
    if: needs.detect-changes.outputs.backend == 'true' && needs.test.result == 'success'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Install Backend Dependencies'
        working-directory: backend
        run: npm ci --omit=dev

      - name: 'Deploy Backend to Azure App Service'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.BACKEND_APP_SERVICE_NAME }}
          publish-profile: ${{ secrets.BACKEND_PUBLISH_PROFILE }}
          package: ./backend

  ####################################
  # JOB 3: BUILD & DEPLOY FRONTEND   #
  ####################################
  build-and-deploy-frontend:
    needs: [detect-changes, lint, test, build-and-deploy-backend]
    if: |
      always() &&
      needs.detect-changes.outputs.frontend == 'true' &&
      (needs.build-and-deploy-backend.result == 'success' || needs.build-and-deploy-backend.result == 'skipped') &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Build Frontend App'
        run: |
          BACKEND_URL="https://${{ secrets.BACKEND_APP_SERVICE_NAME }}.azurewebsites.net"
          echo "Connecting Frontend to Backend at: $BACKEND_URL"

          cd frontend
          REACT_APP_API_BASE_URL="$BACKEND_URL" npm ci
          REACT_APP_API_BASE_URL="$BACKEND_URL" npm run build
          rm -rf deploy
          mkdir -p deploy/build
          cp package.json server.js deploy/
          cp -R build/. deploy/build/

      - name: 'Deploy Frontend to Azure App Service'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.FRONTEND_APP_SERVICE_NAME }}
          publish-profile: ${{ secrets.FRONTEND_PUBLISH_PROFILE }}
          package: ./frontend/deploy
